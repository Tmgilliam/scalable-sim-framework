name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (new packages)
        run: flake8 simulation vertex dashboard --max-line-length=120 --extend-ignore=E501,W503
      - name: Lint (legacy src + tests)
        run: flake8 src tests --max-line-length=120 --extend-ignore=E501,W292
      - name: Pytest (smoke + regression + Monte Carlo)
        run: pytest tests/smoke_test.py tests/validate_outputs.py tests/test_monte_carlo.py -v
