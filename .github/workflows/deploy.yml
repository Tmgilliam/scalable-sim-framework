name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate simulation before deploy
        run: |
          pip install pytest pyyaml
          pytest tests/smoke_test.py tests/validate_outputs.py -v
      - name: Auth to Google Cloud
        if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/setup-gcloud@v2
      - name: Build and push image (when Dockerfile present)
        if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}
        run: |
          if [ -f Dockerfile ]; then
            IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalable-sim-framework:${{ github.sha }}"
            gcloud builds submit --tag "$IMAGE" .
            echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          else
            echo "Dockerfile not found — skip container deploy until added"
          fi
      - name: Deploy to Cloud Run (optional)
        if: ${{ env.IMAGE != '' }}
        run: |
          gcloud run deploy scalable-sim-framework \
            --image "$IMAGE" \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT_ID }}" || echo "Cloud Run deploy skipped — configure service"
      - name: Post-deploy health note
        run: echo "Configure live health check URL after Cloud Run service is created"
